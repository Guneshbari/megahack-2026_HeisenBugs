version: '3.8'

x-backend-base: &backend-base
  build:
    context: .
    dockerfile: Dockerfile.backend
  environment:
    - SENTINEL_KAFKA_HOST=kafka:9092
    - SENTINEL_DB_HOST=postgres
    - SENTINEL_DB_PORT=5432
    - SENTINEL_DB_USER=sentinel
    - SENTINEL_DB_PASSWORD=sentinel_pass
    - SENTINEL_DB_NAME=sentinel_db
    - SENTINEL_DB_POOL_MAX=20
    - SENTINEL_INSERT_BATCH_SIZE=1000
    # Firebase auth — override with real values in production
    - SENTINEL_FIREBASE_AUTH_ENABLED=false
    - SENTINEL_FIREBASE_SERVICE_ACCOUNT_PATH=
    # CORS — add your deployed frontend URL here for production
    - SENTINEL_API_CORS_ALLOWED_ORIGINS=http://localhost:5173
  depends_on:
    postgres:
      condition: service_healthy
    kafka:
      condition: service_healthy
  deploy:
    resources:
      limits:
        memory: 512m
        cpus: '0.5'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel_pass
      POSTGRES_DB: sentinel_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinel_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'

  kafka:
    image: bitnami/kafka:3.5
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      # NOTE: ALLOW_PLAINTEXT_LISTENER is acceptable for local dev.
      # For production, configure TLS listeners and update producer/consumer SSL settings.
      - ALLOW_PLAINTEXT_LISTENER=yes
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "127.0.0.1:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'

  api_server:
    <<: *backend-base
    ports:
      - "8000:8000"
    command: ["uvicorn", "api_server:app", "--app-dir", "src", "--host", "0.0.0.0", "--port", "8000"]

  kafka_consumer:
    <<: *backend-base
    working_dir: /app/src
    command: ["python", "-m", "kafka_to_postgres"]
    # Waits for DB to be healthy so migration won't crash

  feature_builder:
    <<: *backend-base
    working_dir: /app/src
    command: ["python", "-m", "feature_builder"]
    depends_on:
      kafka_consumer:
        condition: service_started
      postgres:
        condition: service_healthy

volumes:
  pgdata:
