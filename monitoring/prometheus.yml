# Prometheus configuration for SentinelCore monitoring

global:
  scrape_interval: 15s
  evaluation_interval: 15s

  external_labels:
    monitor: "sentinelcore"

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["localhost:9093"]

# Rule files (optional for alerts later)
rule_files:
  # - "alert_rules.yml"

scrape_configs:
  # Prometheus monitoring itself
  - job_name: "prometheus"
    scrape_interval: 5s
    static_configs:
      - targets: ["localhost:9090"]

  # Node exporter system metrics
  - job_name: "node"
    static_configs:
      - targets: ["localhost:9100"]

  # SentinelCore FastAPI metrics
  - job_name: "sentinelcore"
    metrics_path: /metrics-export
    scrape_interval: 5s
    static_configs:
      - targets: ["localhost:8080"]
